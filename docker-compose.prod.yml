# Production — full stack
services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-goodguytcg}
      POSTGRES_USER: ${POSTGRES_USER:-goodguytcg}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-goodguytcg}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  app:
    build: .
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3000}:3000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-goodguytcg}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-goodguytcg}
      AUTH_SECRET: ${AUTH_SECRET:?Set AUTH_SECRET in .env}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      AUTH_LINE_ID: ${AUTH_LINE_ID:-}
      AUTH_LINE_SECRET: ${AUTH_LINE_SECRET:-}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - uploads:/app/public/uploads
    networks:
      - internal

volumes:
  pgdata:
  uploads:

networks:
  internal:
