# Development — just database
services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: goodguytcg
      POSTGRES_USER: goodguytcg
      POSTGRES_PASSWORD: goodguytcg_dev_2024
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U goodguytcg"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
